controller:
  # HA mode - 2 replicas with pod disruption budget
  replicaCount: 2

  admin:
    username: admin
    password: CxJenkins2026!

  serviceType: ClusterIP

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - job-dsl:latest
    - credentials-binding:latest
    - pipeline-stage-view:latest
    - antisamy-markup-formatter:latest

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Resource limits for HA stability
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2048Mi"

  JCasC:
    defaultConfig: true
    configScripts:
      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc"
                namespace: "devops"
                jenkinsUrl: "http://jenkins.devops:8080"
                jenkinsTunnel: "jenkins-agent.devops:50000"
                connectTimeout: 5
                readTimeout: 15
                containerCapStr: "10"
                templates:
                  - name: "kube-worker"
                    namespace: "devops"
                    label: "kube-worker"
                    nodeUsageMode: NORMAL
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "200m"
                        resourceRequestMemory: "256Mi"
                      - name: "postgres-client"
                        image: "postgres:15-alpine"
                        command: "sleep"
                        args: "infinity"
                        ttyEnabled: true
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "128Mi"

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - jenkins.devops.local
    annotations:
      kubernetes.io/ingress.class: traefik

  imagePullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 2Gi
  storageClass: "standard"

agent:
  enabled: true
  namespace: devops
  workingDir: "/home/jenkins/agent"

serviceAccount:
  create: true
  name: jenkins
