auth:
  existingSecret: postgres-secret
  secretKeys:
    adminPasswordKey: postgres-password
  username: postgres
  database: devops

image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: "latest"
  pullPolicy: IfNotPresent

primary:
  persistence:
    enabled: true
    size: 2Gi
    storageClass: "standard"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

metrics:
  enabled: false
