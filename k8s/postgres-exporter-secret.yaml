# k8s/postgres-exporter-secret.yaml
# TEMPLATE ONLY - real secret is created by deploy.sh at install time
# deploy.sh creates: kubectl create secret generic postgres-exporter-secret
#   --from-literal=DATA_SOURCE_NAME="postgres://postgres:<PASSWORD>@..."
# This file is never applied directly - deploy.sh skips it and creates the real one
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: devops
type: Opaque
stringData:
  DATA_SOURCE_NAME: "postgres://postgres:REPLACE_BY_DEPLOY_SCRIPT@postgres-postgresql.devops.svc.cluster.local:5432/devops?sslmode=disable"
