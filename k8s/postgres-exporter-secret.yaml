# k8s/postgres-exporter-secret.yaml
# NOTE: This file is a template placeholder only.
# The actual secret with real password is created by deploy.sh at deploy time.
# It is NOT committed with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: devops
type: Opaque
stringData:
  DATA_SOURCE_NAME: "postgres://postgres:REPLACE_AT_DEPLOY_TIME@postgres-postgresql.devops.svc.cluster.local:5432/devops?sslmode=disable"
