# k8s/postgres-exporter-secret.yaml
# FIX: DATA_SOURCE_NAME now pulls password from the postgres-secret K8s Secret
# The secret itself is created by deploy.sh (not committed to git)

apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: devops
type: Opaque
stringData:
  # ✅ Password is injected at deploy time by deploy.sh, not hardcoded here.
  # deploy.sh runs: kubectl create secret generic postgres-exporter-secret ...
  # This file is a placeholder — the actual secret is created in deploy.sh
  DATA_SOURCE_NAME: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres-postgresql.devops.svc.cluster.local:5432/devops?sslmode=disable"
